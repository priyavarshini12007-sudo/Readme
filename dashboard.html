<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>🌸 Dashboard 🌸</h1>

<div class="dashboard-card">
<h3>👩‍🎓 Total Students</h3>
<h2 id="studentCount"></h2>
</div>

<div class="dashboard-card">
<h3>📋 Total Attendance Records</h3>
<h2 id="attendanceCount"></h2>
</div>

<div class="dashboard-card">
<h3>✅ Present</h3>
<h2 id="presentCount"></h2>
</div>

<div class="dashboard-card">
<h3>❌ Absent</h3>
<h2 id="absentCount"></h2>
</div>

<div class="dashboard-card">
<h3>📊 Present Rate</h3>
<h2 id="attendancePercentage"></h2>
</div>

<h3>Recent Attendance</h3>
<ul id="recentAttendanceList"></ul>

<a href="index.html">
<button>Home</button>
</a>

</div>

<script src="dashboard.js"></script>

</body>

</html>
